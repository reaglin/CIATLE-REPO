server {
    listen 80;
    server_name floridacourserepo.com www.floridacourserepo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name floridacourserepo.com www.floridacourserepo.com;

    ssl_certificate     /etc/letsencrypt/live/floridacourserepo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/floridacourserepo.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 520M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
